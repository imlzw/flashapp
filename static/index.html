<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>闪创 FlashApp</title>
  <link rel="icon" type="image/svg+xml" href="/assets/img/logo.svg">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/console.css">
  <link rel="stylesheet" href="/assets/css/console-stage.css">
  <link rel="stylesheet" href="/assets/css/plaza.css">
  <link rel="stylesheet" href="/assets/css/settings.css">
  <link rel="stylesheet" href="/assets/css/shared/auth.css">
  <link rel="stylesheet" href="/assets/css/shared/publish-modal.css">
  <script src="/assets/js/shared/html2canvas.min.js"></script>
  <script>
    (function() {
      const theme = localStorage.getItem('flashapp_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <div class="ambient"></div>
  <div class="dashboard-shell">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="Close Sidebar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <img src="/assets/img/logo.svg" alt="闪创 Logo" class="brand-logo" width="32" height="32">
        <div class="brand-text">
          <strong class="brand-mark">闪创</strong>
          <span class="brand-meta">FlashApp</span>
        </div>
        <button class="sidebar-theme-btn" id="sidebarThemeBtn" aria-label="Toggle Theme">
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item nav-item-action" id="newApp" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path><path d="M12 9v4"></path><path d="M10 11h4"></path></svg>
          新对话
        </button>
        <div class="nav-item nav-item-static is-active" id="navMyApps">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"></path><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"></path><path d="m3.3 7 8.7 5 8.7-5"></path><path d="M12 22V12"></path></svg>
          我的闪应用
        </div>
        <div class="nav-item nav-item-static" id="navAppSquare">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          应用广场
        </div>
      </nav>

      <section class="sidebar-section">
        <div class="section-title-row">
          <span class="section-title">最近会话</span>
          <span class="section-count" id="appCount">0</span>
        </div>

        <div class="app-list" id="appList"></div>
        <div class="empty" id="appEmpty">登录后查看历史应用</div>
      </section>

      <footer class="sidebar-footer">
        <div class="user-panel" id="userPanel" hidden>
          <div class="user-avatar" aria-hidden="true">F</div>
          <div class="user-copy">
            <strong class="user-name" id="accountName">加载中...</strong>
            <div class="user-status">
              <span id="healthMode">检测中</span>
              <span class="status-divider"></span>
              <span id="healthModel">模型...</span>
            </div>
          </div>
          <button class="footer-button" id="settingsBtn" type="button" title="设置">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2a2 2 0 0 1-2 2a2 2 0 0 0-2 2a2 2 0 0 1-2 2a2 2 0 0 0-2 2v.44a2 2 0 0 0 2 2a2 2 0 0 1 2 2a2 2 0 0 0 2 2a2 2 0 0 1 2 2a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2a2 2 0 0 1 2-2a2 2 0 0 0 2-2a2 2 0 0 1 2-2a2 2 0 0 0 2-2v-.44a2 2 0 0 0-2-2a2 2 0 0 1-2-2a2 2 0 0 0-2-2a2 2 0 0 1-2-2a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
          <button class="footer-button" id="logoutBtn" type="button" title="退出">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          </button>
        </div>
        <div class="user-panel-unlogged" id="userPanelUnlogged">
          <button class="login-trigger-btn" id="sidebarLoginBtn">
            <div class="user-avatar-placeholder">
               <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <span>登录 / 注册</span>
          </button>
        </div>
      </footer>
    </aside>

    <main class="main-stage">
      <!-- 动态背景层 -->
      <div class="stage-background">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
      </div>
      
      <header class="stage-header">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle Sidebar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div class="header-left" id="headerLeft" style="display: none;">
          <h2 id="plazaTitle">应用广场</h2>
          <p id="plazaSubtitle">发现、复制并重混由社区创建的闪应用</p>
        </div>
        <div class="header-right" style="display: flex; align-items: center; gap: 16px;">
            <div class="stage-search" id="plazaSearchContainer" style="display: none;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="plazaSearchInput" placeholder="搜索应用..." class="stage-search-input">
            </div>
        </div>
      </header>

      <section class="plaza-stage" id="plazaStage" hidden>
        <div class="plaza-grid" id="plazaGrid"></div>
      </section>

      <section class="settings-stage" id="settingsStage" hidden>
        <div class="settings-container">
          <div class="settings-card">
            <h3 class="settings-title">基本信息</h3>
            <form id="profileForm" class="settings-form">
              <div class="settings-group">
                <div class="settings-field">
                  <label for="settingsNickname">用户昵称</label>
                  <input type="text" id="settingsNickname" class="settings-input" required minlength="1" maxlength="24" placeholder="输入新的昵称">
                </div>
                <div class="settings-field">
                  <label for="settingsUsername">登录账号</label>
                  <input type="text" id="settingsUsername" class="settings-input" required minlength="3" maxlength="24" placeholder="输入新的登录账号">
                </div>
              </div>
              <div class="settings-actions">
                <button type="submit" class="settings-btn settings-btn-primary" id="saveProfileBtn">保存信息</button>
              </div>
              <div id="profileMessage" class="settings-message"></div>
            </form>
          </div>

          <div class="settings-card">
            <h3 class="settings-title">安全配置</h3>
            <form id="passwordForm" class="settings-form">
              <div class="settings-group">
                <div class="settings-field">
                  <label for="oldPassword">当前密码</label>
                  <input type="password" id="oldPassword" class="settings-input" required minlength="6" placeholder="输入当前密码">
                </div>
                <div class="settings-field">
                  <label for="newPassword">新密码</label>
                  <input type="password" id="newPassword" class="settings-input" required minlength="6" placeholder="输入新密码 (至少6位)">
                </div>
              </div>
              <div class="settings-actions">
                <button type="submit" class="settings-btn settings-btn-primary" id="savePasswordBtn">修改密码</button>
              </div>
              <div id="passwordMessage" class="settings-message"></div>
            </form>
          </div>
        </div>
      </section>

      <section class="chat-stage" id="chatStage">
        <div class="chat-feed" id="chatScroller">
          <div class="chat-feed-inner">
            <div class="chat-empty" id="chatEmpty">
                <h1 class="welcome-title">你好啊，人类</h1>
                <p class="welcome-subtitle">输入你的脑袋中闪出的想法，即刻生成Web应用</p>
                <div class="suggestion-grid">
                    <button class="suggestion-chip">✦ 生成一个待办事项清单</button>
                    <button class="suggestion-chip">✦ 帮我写一个贪吃蛇游戏</button>
                    <button class="suggestion-chip">✦ 创建一个个人简历页面</button>
                    <button class="suggestion-chip">✦ 制作一个番茄钟计时器</button>
                    <button class="suggestion-chip">✦ 写一个简单的计算器</button>
                    <button class="suggestion-chip">✦ 生成一个Markdown编辑器</button>
                </div>
            </div>
            <div class="chat-watermark" id="chatWatermark" hidden>内容由 AI 生成</div>
            <div class="chat-stream" id="chatFeed"></div>
          </div>
        </div>

        <section class="composer">
          <div class="composer-inner">
            <div class="composer-shell">
              <textarea id="prompt" class="prompt-input" placeholder="问一问闪创..."></textarea>
              <button class="send-button" id="sendBtn" type="button">
                <i class="icon-send"></i>
              </button>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>
  <div class="modal-layer" id="previewModal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-container">
      <div class="modal-close-area" id="closePreviewModal">
         <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </div>
      <div class="modal-body" id="previewModalBody"></div>
    </div>
  </div>
  <script type="module" src="/assets/js/pages/index.js"></script>
</body>
</html>
