<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 闪创 FlashApp Logo -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="0" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect x="20" y="20" width="160" height="160" rx="40" fill="url(#logoGradient)" filter="url(#shadow)" />
  <!-- 闪电图标 (象征 "闪") -->
  <path d="M115 45L65 110H95L85 155L135 90H105L115 45Z" fill="white" stroke="white" stroke-width="2" stroke-linejoin="round" />
  <!-- 装饰圆点 (象征 "创"/AI/节点) -->
  <circle cx="145" cy="55" r="8" fill="white" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="55" cy="145" r="6" fill="white" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite" />
  </circle>
</svg>
